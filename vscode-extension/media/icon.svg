<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46D8F2"/>
      <stop offset="1" stop-color="#1FA3C9"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD968"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- terminal / agent window -->
  <rect x="38" y="70" width="154" height="124" rx="18" fill="#16212e"/>
  <g fill="#46586c">
    <circle cx="60" cy="91" r="5"/>
    <circle cx="78" cy="91" r="5"/>
    <circle cx="96" cy="91" r="5"/>
  </g>
  <!-- prompt: >_ -->
  <polyline points="84,128 114,151 84,174" fill="none" stroke="#FFD968" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="128" y1="175" x2="170" y2="175" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round"/>

  <!-- notification bell badge -->
  <circle cx="192" cy="76" r="34" fill="url(#bell)" stroke="#FFFFFF" stroke-width="5"/>
  <g fill="#16212e">
    <circle cx="192" cy="60" r="3.8"/>
    <path d="M177 90 C 177 74, 184 65, 192 63 C 200 65, 207 74, 207 90 Z"/>
    <rect x="173" y="86" width="38" height="6.8" rx="3.4"/>
    <circle cx="192" cy="99" r="4.8"/>
  </g>
</svg>
