name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build:shared

      - run: npm run build:cli

      - run: npm pack
        working-directory: cli

      - uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: cli/pingo-*.tgz

  extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build:shared

      - run: npm run build:ext

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies -o pingo.vsix
        working-directory: vscode-extension

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode-extension/pingo.vsix

  release:
    name: Create Release
    needs:
      - cli
      - extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate Release Notes
        run: |
          echo "## Pingo ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "Give your coding agents a voice." >> release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "| Asset | Install |" >> release-notes.md
          echo "| ----- | ------- |" >> release-notes.md
          echo "| \`pingo-*.tgz\` | CLI — \`npm install -g pingo\` (or install the published package) |" >> release-notes.md
          echo "| \`pingo.vsix\` | VS Code extension — install from the Marketplace, or \`code --install-extension pingo.vsix\` |" >> release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            cli-package/pingo-*.tgz
            vscode-extension/pingo.vsix
