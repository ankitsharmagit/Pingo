name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - run: npm ci
        working-directory: cli

      - run: npm run build
        working-directory: cli

      - run: npm pack
        working-directory: cli

      - uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: cli/pingo-*.tgz

  desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
        working-directory: desktop

      - run: npm run tauri build
        working-directory: desktop

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  desktop-macos:
    name: Build Desktop (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
        working-directory: desktop

      - run: npm run tauri build
        working-directory: desktop

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci
        working-directory: desktop

      - run: npm run tauri build
        working-directory: desktop

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    name: Create Release
    needs:
      - cli
      - desktop-windows
      - desktop-macos
      - desktop-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Generate Release Notes
        run: |
          echo "## Pingo v${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "| Asset | Platform |" >> release-notes.md
          echo "| ----- | -------- |" >> release-notes.md
          echo "| \`cli/pingo-*.tgz\` | CLI package (npm install -g \`npm pack\`) |" >> release-notes.md
          echo "| \`desktop-windows/*.msi\` | Windows Installer |" >> release-notes.md
          echo "| \`desktop-windows-nsis/*.exe\` | Windows NSIS Installer |" >> release-notes.md
          echo "| \`desktop-macos/*.dmg\` | macOS Disk Image |" >> release-notes.md
          echo "| \`desktop-linux/*.AppImage\` | Linux AppImage |" >> release-notes.md
          echo "" >> release-notes.md
          echo "> **Windows SmartScreen**: Since Pingo is not yet code-signed, Windows may show a SmartScreen warning. Click **More info** → **Run anyway** to proceed. Pingo is open source and the source code is available for inspection." >> release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            cli-package/pingo-*.tgz
            desktop-windows/*.msi
            desktop-windows-nsis/*.exe
            desktop-macos/*.dmg
            desktop-linux/*.AppImage
